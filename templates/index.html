<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova - AI Assistant</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="dark-mode">
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2><i class="fa-solid fa-robot"></i> Nova AI</h2>
            </div>
            <button class="new-chat-btn" id="new-chat-btn"><i class="fa-solid fa-plus"></i> New Chat</button>
            
            <div class="sidebar-menu">
                <div class="menu-item theme-toggle" id="theme-toggle">
                    <i class="fa-solid fa-sun light-icon" style="display:none;"></i>
                    <i class="fa-solid fa-moon dark-icon"></i>
                    <span>Toggle Theme</span>
                </div>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-area">
            <header class="chat-header">
                <div class="header-title">
                    <h1>Nova Assistant</h1>
                    <p class="status">Online</p>
                </div>
            </header>

            <div class="chat-history" id="chat-history">
                <!-- Welcome Message -->
                <div class="message bot-message slide-in">
                    <div class="avatar"><i class="fa-solid fa-robot"></i></div>
                    <div class="message-content">
                        <p>Hello! I am Nova, your advanced AI assistant. How can I help you today?</p>
                    </div>
                </div>
            </div>

            <div class="chat-input-container">
                <form id="chat-form">
                    <div class="input-wrapper">
                        <input type="text" id="user-input" placeholder="Type a message..." autocomplete="off">
                        <button type="submit" id="send-btn"><i class="fa-solid fa-paper-plane"></i></button>
                    </div>
                </form>
                <div class="footer-text">Nova can make mistakes. Consider verifying important information.</div>
            </div>
        </main>
    </div>

    <!-- Add marked.js for simple markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
